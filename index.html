
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Holy Bible in English, Greek, Latin and Arabic</title>
<link rel="stylesheet" href="./style.css">


</head>



<body>




<div id="main">

    <!-- SINGLE NAVIGATION COLUMN -->
    

        


 <!-- ==================================
         NAVIGATION
    =================================== -->

    <aside id="navA" class="nav-column">

        <!-- CONTROLS -->

        <div class="nav-controls">

            <select id="fontSelector">

                <option value="12px">12px</option>
                <option value="14px">14px</option>
                <option value="16px" selected>
                    16px
                </option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
				<option value="22px">22px</option>
                <option value="24px">24px</option>

            </select>

            <select id="highlightSelector">

                <option value="blue">
                    Blue Highlight
                </option>

                <option value="green" selected>
                    Green Highlight
                </option>

                <option value="yellow">
                    Yellow Highlight
                </option>
        <option value="red">Red Highlight</option>
        <option value="purple">Purple Highlight</option>
        <option value="dark">Dark Highlight</option>

            </select>

            <button id="layoutToggle">

                Switch Layout

            </button>

        </div>

        <!-- NAVIGATION JS INJECTS HERE -->

    </aside>



    













     
    
    <div class="frame-wrapper">

		<div class="iframe-title" id="titleB">
        LEFT PANEL
		</div>

		<iframe id="frameB"></iframe>

	</div>

    <div class="frame-wrapper center-wrapper">

		<div class="iframe-title" id="titleC">
        CENTER PANEL
		</div>

		<iframe class="center-frame" id="frameC"></iframe>

	</div>



    
    
    <div class="frame-wrapper">

		<div class="iframe-title" id="titleD">
        RIGHT PANEL
		</div>

		<iframe id="frameD"></iframe>

	</div>
    
    
    
    
    
    


</div>
