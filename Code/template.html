<!DOCTYPE html>
<html>
	<head>
	<meta charset="UTF-8">
	<style>
		html,
		body{
			margin:0;
			padding:0;
			width:100%;
			height:100%;
		
			font-family:monospace;
			font-size:__FONT_SIZE__;
			white-space:normal;
			overflow-wrap:break-word;
			word-break:break-word;
			line-height:1.4;
			background:#000;
			color:#E0E0E0;
			box-sizing:border-box;
	
		}
		body > *:first-child{
			margin-top:0;
		}

		#content{
			white-space:pre-wrap;
			overflow-wrap:break-word;
			word-break:break-word;
			margin:0;
			padding:12px;
		}
		::selection {
    background: __HIGHLIGHT_BG__;
    color: __HIGHLIGHT_TEXT__;
}
* {
    outline: 1px solid red;
}

	</style>
	</head>
<body><div id="content">__CONTENT__</div></body>
</html>
